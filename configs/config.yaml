# What this file does
# This is the main top-level config for the whole project.

# It controls:

# project identity
# hardware choice
# logging level
# experiment tracking
# runtime behavior
# labels used by the pipeline


project:
  name: pedestrian-distraction-detection
  version: "1.0.0"
  description: "Pedestrian distraction detection using MMPose posture analysis and phone detection"
  author: "Adnan Khan, Bilal Asghar"
  random_seed: 42

system:
  device: "cpu"          # auto, cpu, cuda
  num_workers: 0          # keep 0 for Windows safety
  pin_memory: false
  log_level: "INFO"

tracking:
  enable_mlflow: true
  experiment_name: "pedestrian_distraction_detection"
  tracking_uri: "https://dagshub.com/ak5933487/Pedestrian-Distraction-Detection.mlflow"

runtime:
  use_pretrained_phone_detector_fallback: false
  save_prediction_images: true
  save_runtime_hand_crops: false
  enable_debug_visuals: false
  allow_multiple_persons: true

labels:
  posture_classes:
    - not_using
    - suspicious_using
  phone_classes:
    - phone
  final_classes:
    - safe
    - suspicious
    - distracted
